name: Notify Main Site to Rebuild

on:
  push:
    branches:
      - main
    paths:
      # Only trigger a rebuild when actual content changes, not CMS config
      - 'content/**'

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger main site rebuild
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.MAIN_SITE_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/anand-raj/cms-hugo-sveltia/dispatches \
            -d '{"event_type":"state-content-updated","client_payload":{"state":"karnataka"}}'
